[project]
name = "epictrace"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
  "fastapi",
  "uvicorn[standard]",
  "sqlalchemy>=2.0",
  "pydantic>=2",
  "pywebview",
  "pypdf",
  "python-docx",
  "python-pptx",
  "pymilvus[milvus_lite]",
  "FlagEmbedding",
  # FlagEmbedding 1.4.0 的 reranker 调 tokenizer.prepare_for_model,transformers 5.x 已删除该方法
  # → 钉在 4.x(否则 BGE-reranker compute_score 报 'XLMRobertaTokenizer has no attribute prepare_for_model')。
  "transformers<5",
  "openai",
  "jieba",
  "rank_bm25",
  "langgraph",
  "langchain-openai",
  "sse-starlette",
]

[project.optional-dependencies]
dev = ["pytest", "httpx", "reportlab"]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["."]
include = ["epictrace*"]
