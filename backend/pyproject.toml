[project]
name = "epictrace"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
  "fastapi",
  "uvicorn[standard]",
  "sqlalchemy>=2.0",
  "pydantic>=2",
  "pywebview",
  "pypdf",
  "python-docx",
  "python-pptx",
  "pymilvus[milvus_lite]",
]

[project.optional-dependencies]
dev = ["pytest", "httpx", "reportlab"]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["."]
include = ["epictrace*"]
